runtime_benchmark:
  environment_count_candidates: [32, 64, 128]
  initial_environment_count: 64
  control_dt_s: 0.02
  minimum_aggregate_env_steps_per_s: 500.0
  # Production collector measurements deliberately include the cold first
  # control step; this is a conservative end-to-end throughput gate.
  warmup_steps: 0
  measurement_steps: 64
  maximum_wall_time_s: 900.0
  topology_bucketed: true
  phase_specific_resets: true
  per_step_json_logging: false
  require_tensorized_pi_l_inference: true

teacher_collection:
  profile_version: order9_c0_bounded_diversity_v1
  episode_count: 20
  validation_episode_count: 3
  held_out_episode_count: 3
  # Order8 runs at 50 Hz.  Ten-Hz labels retain controller dynamics while
  # avoiding five adjacent near-duplicate labels per learning sample.
  low_level_stride: 5
  high_level_stride: 5
  parallel_process_count: 2
  condition_distribution: conservative_order8_anchor

optimization:
  pi_l_bc:
    # C1 is actor imitation.  The critic is initialized here but first trained
    # by PPO in C2; value regression must not move the shared BC representation.
    # The initial 8-epoch run remained biased by roughly 0.02 normalized action
    # in the late transport interval and timed out 4/4 closed-loop smokes.
    # Continue to an empirically justified convergence budget while using the
    # RTX 4090 headroom to halve the number of batches per epoch.
    epochs: 24
    batch_size: 128
    learning_rate: 0.0003
    value_loss_weight: 0.0
    max_grad_norm: 0.5
    sequence_length: 16
    burn_in_steps: 4
    phase_balanced_sampling: true
  pi_h_assignment_bc:
    epochs: 30
    batch_size: 32
    learning_rate: 0.0003
    value_loss_weight: 0.5
    max_grad_norm: 0.5
    sequence_length: 1
    burn_in_steps: 0
  pi_h_full_bc:
    epochs: 40
    batch_size: 32
    learning_rate: 0.0003
    value_loss_weight: 0.5
    max_grad_norm: 0.5
    sequence_length: 1
    burn_in_steps: 0
  pi_d_bc:
    epochs: 40
    batch_size: 16
    learning_rate: 0.0003
    value_loss_weight: 0.5
    max_grad_norm: 0.5
    sequence_length: 1
    burn_in_steps: 0
  pi_l_ppo:
    rollout_steps_per_environment: 256
    epochs_per_update: 4
    minibatch_size: 4096
    # Generation 0 calibration from the promoted C1 actor showed that 1e-4
    # moved the shared actor/critic trunk to KL=0.251 after one optimizer
    # step (target 0.02).  C1 intentionally leaves the critic untrained, so
    # use a conservative initial C2 rate that keeps critic warm-up on-policy.
    learning_rate: 0.00001
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.20
    value_loss_weight: 0.5
    entropy_bonus_weight: 0.001
    max_grad_norm: 0.5
    target_kl: 0.02
  pi_h_ppo:
    rollout_steps_per_environment: 64
    epochs_per_update: 4
    minibatch_size: 512
    learning_rate: 0.0001
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.20
    value_loss_weight: 0.5
    entropy_bonus_weight: 0.005
    max_grad_norm: 0.5
    target_kl: 0.02
    hard_checker_rejection_penalty: 1.0
  pi_d_ppo:
    rollout_steps_per_environment: 16
    epochs_per_update: 4
    minibatch_size: 256
    learning_rate: 0.0001
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.20
    value_loss_weight: 0.5
    entropy_bonus_weight: 0.01
    max_grad_norm: 0.5
    target_kl: 0.02
    hard_checker_rejection_penalty: 1.0
  joint_ppo:
    rollout_steps_per_environment: 256
    epochs_per_update: 4
    minibatch_size: 4096
    learning_rate: 0.00005
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.20
    value_loss_weight: 0.5
    entropy_bonus_weight: 0.001
    max_grad_norm: 0.5
    target_kl: 0.01
    hard_checker_rejection_penalty: 1.0

