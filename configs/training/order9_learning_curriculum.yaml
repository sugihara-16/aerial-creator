curriculum:
  schedule_version: order9_curriculum_v2
  contact_wrench_contract_version: contact_frame_robot_on_target_v2
  pi_h_is_learned_proposal_only: true
  deterministic_checker_projects_actions: false
  dynamic_assembly_policy_learned: false
  stages:
    - stage_id: c0_order8_teacher_collection
      stage_index: 0
      learning_mode: collection
      learning_target: dataset
      min_modules: 3
      max_modules: 3
      topology_randomized: false
      object_distribution: conservative_order8_anchor
      deterministic_teacher_required: true
      pi_h_output_scope: full_contact_wrench_trajectory
      phase_conditioned_actor_required: true
      design_action_mask_required: false
      assembly_evaluation_mode: separate
      end_to_end_episode_fraction: 0.0
      environment_steps: 0
      minimum_episodes: 20
      minimum_success_rate: 0.95
      minimum_no_fallback_success_rate: 0.0
      maximum_fallback_rate: 1.0
      maximum_safety_failure_episodes: 0
      held_out_only: false
      task_adapter_ids: [object_grasp_carry_v1]

    - stage_id: c1_pi_l_bc_fixed_nominal
      stage_index: 1
      learning_mode: behavior_cloning
      learning_target: pi_l
      min_modules: 3
      max_modules: 3
      topology_randomized: false
      # The morphology is fixed, while C0 supervision contains only bounded
      # perturbations around the nominal Order8 object/contact condition.
      object_distribution: conservative_order8_anchor
      deterministic_teacher_required: true
      pi_h_output_scope: not_applicable
      phase_conditioned_actor_required: true
      design_action_mask_required: false
      assembly_evaluation_mode: separate
      end_to_end_episode_fraction: 0.0
      environment_steps: 0
      minimum_episodes: 100
      minimum_success_rate: 0.90
      minimum_no_fallback_success_rate: 0.0
      maximum_fallback_rate: 1.0
      maximum_safety_failure_episodes: 0
      held_out_only: false
      task_adapter_ids: [object_grasp_carry_v1]

    - stage_id: c2_pi_l_ppo_fixed_conservative
      stage_index: 2
      learning_mode: ppo
      learning_target: pi_l
      min_modules: 3
      max_modules: 3
      topology_randomized: false
      object_distribution: conservative_order8_anchor
      deterministic_teacher_required: false
      pi_h_output_scope: not_applicable
      phase_conditioned_actor_required: true
      design_action_mask_required: false
      assembly_evaluation_mode: separate
      end_to_end_episode_fraction: 0.0
      environment_steps: 3000000
      # Provisional RTX 4090 production setting.  Preserve the original PPO
      # generation size (2048 * 16 = 32768) while measuring collection/update
      # speed and load before selecting C3+ parallelism.
      parallel_environment_count: 2048
      rollout_steps_per_environment: 16
      minimum_episodes: 200
      minimum_success_rate: 0.85
      minimum_no_fallback_success_rate: 0.0
      maximum_fallback_rate: 1.0
      maximum_safety_failure_episodes: 0
