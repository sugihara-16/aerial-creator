runner:
  episode_count: 1000
  seed: 0
  source_hash: unknown
  runner_version: p3_assembly_eval_runner_v1
  robot_model_config_path: configs/robot/robot_model.yaml
  archive_success_only: false
  max_retries_per_step: 1

distribution:
  object_size_x_m: [0.20, 0.42]
  object_size_y_m: [0.12, 0.30]
  object_size_z_m: [0.08, 0.24]
  object_mass_kg: [0.4, 2.5]
  object_friction: [0.30, 0.95]
  initial_x_m: [0.60, 1.00]
  initial_y_m: [-0.30, 0.30]
  initial_z_m: [0.32, 0.58]
  target_x_m: [1.50, 2.50]
  target_y_m: [-0.40, 0.40]
  target_z_m: [0.32, 0.58]
  target_tolerance_pos_m: 0.05

policy:
  variants:
    - chain_grasp
    - symmetric_two_anchor_grasp
    - tri_anchor_support_grasp
    - central_base_plus_two_grasp_arms
  prefer_accepted: true
  coverage_weight: 4.0
  reachability_weight: 2.0
  slot_weight: 1.0
  thrust_weight: 0.6
  payload_weight: 0.4
  optional_support_bonus: 0.5
  module_penalty: 0.05
  dock_edge_penalty: 0.025
  hard_rejection_penalty: 100.0
